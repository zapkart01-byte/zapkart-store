<script>
        // Simple swipe-to-delete interaction preview
        const cards = document.querySelectorAll('.swipe-card');
        
        cards.forEach(card => {
            let startX = 0;
            let currentX = 0;
            
            card.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
            }, {passive: true});
            
            card.addEventListener('touchmove', e => {
                const x = e.touches[0].clientX;
                currentX = startX - x;
                
                if (currentX > 0 && currentX < 80) {
                    card.style.transform = `translateX(-${currentX}px)`;
                }
            }, {passive: true});
            
            card.addEventListener('touchend', () => {
                if (currentX > 40) {
                    card.style.transform = `translateX(-80px)`;
                    setTimeout(() => {
                        card.style.transform = `translateX(0)`;
                    }, 2000);
                } else {
                    card.style.transform = `translateX(0)`;
                }
                currentX = 0;
            });
        });
        
        // Handle toggle switch state mapping for custom UI
        const toggles = document.querySelectorAll('input[type="checkbox"]');
        toggles.forEach(toggle => {
            toggle.addEventListener('change', function() {
                if(this.checked) {
                    this.classList.add('translate-x-5');
                    this.classList.remove('translate-x-0');
                    this.classList.add('border-primary-container');
                    this.classList.remove('border-surface-container-high');
                    this.nextElementSibling.classList.add('bg-primary-container');
                    this.nextElementSibling.classList.remove('bg-surface-container-high');
                } else {
                    this.classList.remove('translate-x-5');
                    this.classList.add('translate-x-0');
                    this.classList.remove('border-primary-container');
                    this.classList.add('border-surface-container-high');
                    this.nextElementSibling.classList.remove('bg-primary-container');
                    this.nextElementSibling.classList.add('bg-surface-container-high');
                }
            });
        });
    </script>
