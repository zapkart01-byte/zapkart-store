<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Toggle Logic
            const toggle = document.getElementById('store-toggle');
            const statusText = document.getElementById('status-text');

            toggle.addEventListener('change', (e) => {
                if(e.target.checked) {
                    statusText.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>Customers can order from your store';
                    statusText.className = 'text-[12px] text-green-600 font-medium flex items-center gap-1';
                    // Update toggle styles
                    e.target.style.borderColor = '#16a34a';
                    e.target.nextElementSibling.style.backgroundColor = '#16a34a';
                } else {
                    statusText.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span>Hidden from customers';
                    statusText.className = 'text-[12px] text-red-600 font-medium flex items-center gap-1';
                    // Update toggle styles
                    e.target.style.borderColor = '#ef4444';
                    e.target.nextElementSibling.style.backgroundColor = '#ef4444';
                }
            });

            // Count up animation for stats
            const animateValue = (obj, start, end, duration, isFloat = false) => {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    // easeOutQuart
                    const easeProgress = 1 - Math.pow(1 - progress, 4);
                    
                    let currentVal = start + easeProgress * (end - start);
                    
                    if (isFloat) {
                        obj.innerHTML = currentVal.toFixed(1);
                    } else {
                        // Add commas for thousands
                        obj.innerHTML = Math.floor(currentVal).toLocaleString('en-US');
                    }
                    
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }

            // Start animations slightly delayed to let the cards fade in
            setTimeout(() => {
                const intCounters = document.querySelectorAll('.stat-counter');
                intCounters.forEach(counter => {
                    const target = parseInt(counter.getAttribute('data-target'));
                    animateValue(counter, 0, target, 2000);
                });

                const floatCounters = document.querySelectorAll('.stat-counter-float');
                floatCounters.forEach(counter => {
                    const target = parseFloat(counter.getAttribute('data-target'));
                    animateValue(counter, 0, target, 2000, true);
                });
            }, 800);
        });
    </script>
