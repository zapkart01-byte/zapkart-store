                      "on-secondary-fixed-variant": "#404754",

<style>
        /* Custom styles for animations and specific form resets */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #ff6b00;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #ff6b00;
        }
        .animate-spin-slow {
            animation: spin 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<!-- TopAppBar (From JSON) -->
<header class="flex items-center justify-between px-margin w-full h-14 bg-surface border-b border-outline-variant z-10 sticky top-0">
<div class="flex items-center gap-md">
<button aria-label="Go back" class="flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors text-primary" type="button">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-on-surface">Product Details</h1>
</div>
<button aria-label="Help" class="flex items-center justify-center p-2 -mr-2 rounded-full hover:bg-surface-container-low transition-colors text-primary" type="button">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 px-margin py-md space-y-lg pb-24">
<!-- Image Upload Area -->
<section class="space-y-sm">
<div class="relative h-[160px] w-full border-2 border-dashed border-outline-variant rounded-lg bg-surface-container-lowest flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container-low transition-colors overflow-hidden" id="upload-container" onclick="triggerUpload()">
<!-- State: Empty -->
<div class="flex flex-col items-center justify-center text-secondary pointer-events-none" id="upload-empty">
<span class="material-symbols-outlined text-4xl mb-2" data-icon="add_a_photo" style="font-variation-settings: 'FILL' 0;">add_a_photo</span>
<span class="font-label-lg text-label-lg">Add Product Photo</span>
</div>
<!-- State: Uploading (Hidden initially) -->
<div class="hidden flex-col items-center justify-center text-primary-container pointer-events-none absolute inset-0 bg-surface-container-lowest/80 backdrop-blur-sm z-10" id="upload-progress">
<span class="material-symbols-outlined text-4xl mb-2 animate-spin-slow" data-icon="progress_activity">progress_activity</span>
<span class="font-label-sm text-label-sm">Uploading...</span>
</div>
<!-- State: Uploaded (Hidden initially) -->
<div class="hidden absolute inset-0 w-full h-full" id="upload-preview">
<div class="w-full h-full bg-cover bg-center" data-alt="A pristine bottle of organic dairy milk standing on a clean, white minimalist surface. The lighting is bright and high-key, highlighting the freshness of the product against a sterile SaaS-style background. Subtle ambient shadows ground the bottle, enhancing the modern, professional aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCDXQhuyaevcY_iVJ6rLmmgA8lmzGw2ub-MGkgOd9P-WUF3G8eNgUzdK4wtp40OQ6s0zwaz2s-9J5vBavJzdCBhGnOg6ISq7lQ4XqKguPdsAujLX8MzWV_2DZIaAyhuAZ53eHNmlmECVRe2gEUYYSv-nf5N8mbJQcRX2fC9dz0L2zlXA_-2u2wxPZBuJN4rL3ZRBNMmUNUCtis-aHMFhoIaRw2x-cnT9m4_zHAsSxmTFYA0X7J4eo66QvxNfYnM_bPuaoTHLM6LLg');"></div>
<div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
<div class="bg-surface-container-lowest text-on-surface px-md py-sm rounded-full font-label-md flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span> Change Photo
                        </div>
</div>
</div>
</div>
</section>
<!-- Form Fields -->
<section class="space-y-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="product-name">Product Name <span class="text-error">*</span></label>
<input class="h-12 w-full border border-outline-variant rounded-lg px-md font-body-md text-body-md bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-shadow shadow-sm" id="product-name" oninput="validateForm()" placeholder="e.g. Amul Taaza Milk" required="" type="text"/>
</div>
<div class="grid grid-cols-2 gap-gutter">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="category">Category <span class="text-error">*</span></label>
<div class="relative">
<select class="h-12 w-full appearance-none border border-outline-variant rounded-lg pl-md pr-10 font-body-md text-body-md bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container shadow-sm transition-shadow" id="category" onchange="validateForm()" required="">
<option disabled="" selected="" value="">Select...</option>
<option value="dairy">Dairy &amp; Eggs</option>
<option value="vegetables">Vegetables</option>
<option value="fruits">Fruits</option>
<option value="bakery">Bakery</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="pack-size">Pack Size / Unit</label>
<input class="h-12 w-full border border-outline-variant rounded-lg px-md font-body-md text-body-md bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-shadow shadow-sm" id="pack-size" placeholder="e.g. 500 ml" type="text"/>
</div>
</div>
</section>
<!-- Pricing Card -->
<section class="bg-surface-container-lowest rounded-lg p-md shadow-sm border border-outline-variant space-y-md">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Pricing Details</h2>
<div class="space-y-gutter">
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="mrp">Platform MRP (₹)</label>
<span class="font-body-sm text-body-sm text-secondary flex items-center gap-1"><span class="material-symbols-outlined text-sm" data-icon="info">info</span> Set by ZapKart</span>
</div>
<input class="h-12 w-full border border-outline-variant rounded-lg px-md font-body-lg text-body-lg font-medium bg-surface-container-low text-on-surface-variant cursor-not-allowed" id="mrp" readonly="" type="number" value="60"/>
</div>
<div class="flex flex-col gap-xs relative">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="selling-price">Your Selling Price (₹) <span class="text-error">*</span></label>
<!-- Discount Badge -->
<span class="hidden bg-success-soft text-success-text font-label-sm px-2 py-1 rounded-sm fade-in items-center gap-1" id="discount-badge">
<span class="material-symbols-outlined text-[10px]" data-icon="trending_down">trending_down</span>
<span id="discount-value">17% OFF</span>
</span>
</div>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-body-lg text-on-surface-variant">₹</span>
<input class="h-12 w-full border border-outline-variant rounded-lg pl-8 pr-md font-body-lg text-body-lg font-bold bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all shadow-sm" id="selling-price" oninput="calculateDiscount()" placeholder="0.00" required="" type="number"/>
</div>
<span class="hidden font-body-sm text-body-sm text-error mt-1 fade-in" id="price-error">Selling price cannot exceed MRP.</span>
</div>
</div>
</section>
<!-- Stock Quantity -->
<section class="flex items-center justify-between bg-surface-container-lowest rounded-lg p-md shadow-sm border border-outline-variant">
<div class="flex flex-col">
<label class="font-label-lg text-label-lg text-on-surface">Stock Quantity</label>
<span class="font-body-sm text-body-sm text-secondary">Current available inventory</span>
</div>
<div class="flex items-center border border-outline-variant rounded-lg overflow-hidden shadow-sm h-10 bg-surface-container-lowest">
<button aria-label="Decrease stock" class="w-10 h-full flex items-center justify-center text-on-surface hover:bg-surface-container-low transition-colors active:bg-surface-variant" onclick="updateStock(-1)" type="button">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<input class="w-12 h-full text-center font-body-md font-medium border-x border-outline-variant focus:outline-none bg-transparent" id="stock-quantity" min="0" type="number" value="10"/>
<button aria-label="Increase stock" class="w-10 h-full flex items-center justify-center text-on-surface hover:bg-surface-container-low transition-colors active:bg-surface-variant" onclick="updateStock(1)" type="button">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</section>
<!-- Visibility Toggle -->
<section class="flex items-center justify-between bg-surface-container-lowest rounded-lg p-md shadow-sm border border-outline-variant">
<div class="flex flex-col pr-md">
<label class="font-label-lg text-label-lg text-on-surface cursor-pointer" for="visibility-toggle">Show to customers</label>
<span class="font-body-sm text-body-sm text-secondary">Product visible in ZapKart app</span>
</div>
<div class="relative inline-block w-12 h-6 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surface-container-high appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" id="visibility-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-container-high cursor-pointer transition-colors duration-200 ease-in-out" for="visibility-toggle"></label>
</div>
</section>
</main>
<!-- Fixed Bottom Area -->
<div class="fixed bottom-0 w-full bg-background p-margin border-t border-surface-variant z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<button class="w-full h-[52px] rounded-lg font-label-lg text-label-lg flex items-center justify-center transition-all duration-300 ease-in-out bg-surface-container-high text-on-surface-variant opacity-70 cursor-not-allowed" disabled="" id="save-btn">
            Save Product
        </button>
</div>
<script>
        // --- Image Upload Logic ---
        let isUploading = false;
        function triggerUpload() {
            if(isUploading) return;
            isUploading = true;
            
            const emptyState = document.getElementById('upload-empty');
            const progressState = document.getElementById('upload-progress');
            const previewState = document.getElementById('upload-preview');

            // Show progress
            emptyState.classList.add('hidden');
            previewState.classList.add('hidden');
            progressState.classList.remove('hidden');
            progressState.classList.add('flex');

            // Simulate upload delay
            setTimeout(() => {
                progressState.classList.remove('flex');
                progressState.classList.add('hidden');
                previewState.classList.remove('hidden');
                isUploading = false;
                validateForm(); // Re-validate to potentially enable save button
            }, 1500);
        }

        // --- Stock Logic ---
        function updateStock(change) {
            const input = document.getElementById('stock-quantity');
            let val = parseInt(input.value) || 0;
            val += change;
            if(val < 0) val = 0;
            input.value = val;
        }

        // --- Pricing & Discount Logic ---
        function calculateDiscount() {
            const mrpInput = document.getElementById('mrp');
            const sellingInput = document.getElementById('selling-price');
            const badge = document.getElementById('discount-badge');
            const badgeValue = document.getElementById('discount-value');
            const errorText = document.getElementById('price-error');
            
            const mrp = parseFloat(mrpInput.value);
            const selling = parseFloat(sellingInput.value);

            // Reset states
            sellingInput.classList.remove('border-error', 'focus:border-error', 'focus:ring-error');
            sellingInput.classList.add('border-outline-variant', 'focus:border-primary-container', 'focus:ring-primary-container');
            errorText.classList.add('hidden');
            badge.classList.add('hidden');
            badge.classList.remove('flex');

            if(isNaN(selling)) {
                validateForm();
                return;
            }

            if (selling > mrp) {
                // Error state
                sellingInput.classList.remove('border-outline-variant', 'focus:border-primary-container', 'focus:ring-primary-container');
                sellingInput.classList.add('border-error', 'focus:border-error', 'focus:ring-error');
                errorText.classList.remove('hidden');
            } else if (selling < mrp && selling > 0) {
                // Discount state
                const discountPercent = Math.round(((mrp - selling) / mrp) * 100);
                badgeValue.innerText = `${discountPercent}% OFF`;
                badge.classList.remove('hidden');
                badge.classList.add('flex');
            }
            
            validateForm();
        }

        // --- Form Validation for Save Button ---
        function validateForm() {
            const name = document.getElementById('product-name').value.trim();
            const category = document.getElementById('category').value;
            const selling = parseFloat(document.getElementById('selling-price').value);
            const mrp = parseFloat(document.getElementById('mrp').value);
            const isUploaded = !document.getElementById('upload-preview').classList.contains('hidden');
            
            const saveBtn = document.getElementById('save-btn');
            
            // Basic validation: Name, Category, Valid Selling Price
            const isValid = name !== "" && 
                            category !== "" && 
                            !isNaN(selling) && 
                            selling > 0 && 
                            selling <= mrp &&
                            isUploaded; // Require image upload for extra polished feel

            if (isValid) {
                saveBtn.disabled = false;
                saveBtn.classList.remove('bg-surface-container-high', 'text-on-surface-variant', 'opacity-70', 'cursor-not-allowed');
                saveBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'hover:opacity-90', 'shadow-md');
            } else {
                saveBtn.disabled = true;
                saveBtn.classList.add('bg-surface-container-high', 'text-on-surface-variant', 'opacity-70', 'cursor-not-allowed');
                saveBtn.classList.remove('bg-primary-container', 'text-on-primary-container', 'hover:opacity-90', 'shadow-md');
            }
        }
    </script>
</body></html>
