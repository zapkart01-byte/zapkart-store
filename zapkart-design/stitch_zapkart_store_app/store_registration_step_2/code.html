<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>ZapKart Store Registration - Step 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#a04100",
                        "surface": "#f8f9fa",
                        "background": "#f8f9fa",
                        "on-primary-fixed-variant": "#7a3000",
                        "secondary-fixed": "#dce2f3",
                        "on-secondary-fixed": "#151c27",
                        "primary-container": "#ff6b00",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#dce2f3",
                        "primary-fixed": "#ffdbcc",
                        "on-secondary-fixed-variant": "#404754",
                        "on-primary-container": "#572000",
                        "secondary": "#585f6c",
                        "surface-bright": "#f8f9fa",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#5e6572",
                        "on-error": "#ffffff",
                        "outline": "#8e7164",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed-dim": "#b7c4ff",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "secondary-fixed-dim": "#c0c7d6",
                        "surface-dim": "#d9dadb",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#002682",
                        "inverse-surface": "#2e3132",
                        "tertiary-fixed": "#dce1ff",
                        "on-surface": "#191c1d",
                        "error": "#ba1a1a",
                        "inverse-primary": "#ffb693",
                        "surface-variant": "#e1e3e4",
                        "primary-fixed-dim": "#ffb693",
                        "on-surface-variant": "#5a4136",
                        "tertiary-container": "#7692ff",
                        "on-tertiary-fixed": "#001551",
                        "on-error-container": "#93000a",
                        "surface-container": "#edeeef",
                        "outline-variant": "#e2bfb0",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#351000",
                        "on-background": "#191c1d",
                        "primary": "#a04100",
                        "on-tertiary-fixed-variant": "#0039b5",
                        "tertiary": "#2151da"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "xl": "32px",
                        "margin": "20px",
                        "base": "4px",
                        "md": "16px",
                        "sm": "8px",
                        "gutter": "16px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],

                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "600" }],

                        "headline-md": ["22px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #191c1d;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .input-field {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 1px solid #e1e3e4;
            border-radius: 8px;
            background-color: #ffffff;
            font-size: 14px;
            color: #191c1d;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #ff6b00;
            box-shadow: 0 0 0 1px #ff6b00;
        }

        .input-label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 500;
            color: #5a4136;
        }

        .slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-fill {
            width: 0%;
            transition: width 0.6s ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="max-w-[390px] mx-auto relative bg-surface-container-lowest">
<!-- TopAppBar -->
<header class="fixed top-0 w-full max-w-[390px] z-50 flex items-center px-margin h-14 bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline">
<button class="mr-4 active:scale-95 duration-150 p-2 -ml-2 rounded-full hover:bg-surface-container-low text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">Register Store</h1>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-[72px] pb-[100px] px-4 overflow-y-auto">
<!-- Progress Stepper -->
<div class="mb-8 relative slide-up" style="animation-delay: 0.1s;">
<div class="flex justify-between items-center relative z-10 px-2">
<!-- Step 1 -->
<div class="flex flex-col items-center gap-2">
<div class="w-6 h-6 rounded-full bg-primary-container text-on-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-[10px] text-on-surface-variant font-medium">Store Details</span>
</div>
<!-- Step 2 -->
<div class="flex flex-col items-center gap-2">
<div class="w-6 h-6 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-bold text-xs shadow-[0_0_0_4px_rgba(255,107,0,0.1)]">
                        2
                    </div>
<span class="text-[10px] text-primary-container font-bold">Bank Details</span>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-2">
<div class="w-6 h-6 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center font-bold text-xs">
                        3
                    </div>
<span class="text-[10px] text-on-surface-variant font-medium">Documents</span>
</div>
</div>
<!-- Progress Line Background -->
<div class="absolute top-[11px] left-8 right-8 h-0.5 bg-surface-variant -z-10"></div>
<!-- Progress Line Fill -->
<div class="absolute top-[11px] left-8 h-0.5 bg-primary-container -z-10 progress-fill" id="progressBar"></div>
</div>
<!-- Header Section -->
<div class="mb-6 slide-up" style="animation-delay: 0.2s;">
<h2 class="font-headline-md text-headline-md text-[#0D0D0D] mb-1">Payment Details</h2>
<p class="text-[13px] text-[#9CA3AF]">We'll transfer your earnings here every week.</p>
</div>
<!-- Form Area -->
<div class="space-y-4">
<!-- Field 1 -->
<div class="slide-up" style="animation-delay: 0.28s;">
<label class="input-label" for="holderName">Account Holder Name</label>
<input class="input-field" id="holderName" placeholder="As per bank records" type="text"/>
</div>
<!-- Field 2 -->
<div class="slide-up" style="animation-delay: 0.36s;">
<label class="input-label" for="accNum">Bank Account Number</label>
<input class="input-field" id="accNum" placeholder="0000 0000 0000" type="number"/>
</div>
<!-- Field 3 -->
<div class="slide-up" style="animation-delay: 0.44s;">
<label class="input-label" for="confAccNum">Confirm Account Number</label>
<input class="input-field" id="confAccNum" placeholder="Re-enter account number" type="number"/>
</div>
<!-- Field 4 -->
<div class="slide-up" style="animation-delay: 0.52s;">
<div class="flex justify-between items-end mb-1">
<label class="input-label mb-0" for="ifsc">IFSC Code</label>
<button class="text-primary-container text-xs font-semibold hover:underline bg-transparent border-none p-0">Find IFSC</button>
</div>
<input class="input-field uppercase" id="ifsc" placeholder="e.g. HDFC0001234" type="text"/>
</div>
<!-- Field 5 -->
<div class="slide-up" style="animation-delay: 0.60s;">
<label class="input-label" for="bankName">Bank Name</label>
<input class="input-field bg-[#F8F9FA] text-[#585f6c]" id="bankName" readonly="" type="text" value="HDFC Bank - Koramangala Branch"/>
</div>
<!-- Field 6 -->
<div class="slide-up" style="animation-delay: 0.68s;">
<label class="input-label" for="upi">UPI ID <span class="text-[#9CA3AF] font-normal">(Optional)</span></label>
<input class="input-field" id="upi" placeholder="store@upi" type="text"/>
</div>
<!-- Info Box -->
<div class="bg-[#DBEAFE] border-l-4 border-blue-600 rounded-r-lg p-3 mt-6 mb-6 flex items-start gap-2 slide-up" style="animation-delay: 0.76s;">
<span class="material-symbols-outlined text-blue-600 text-sm mt-0.5" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-[14px] text-[#1E40AF] leading-snug m-0">Earnings are settled every Monday. Platform commission of 18% is deducted from each order.</p>
</div>
<!-- GSTIN Section -->
<div class="slide-up border-t border-surface-variant pt-6 mt-4" style="animation-delay: 0.84s;">
<label class="input-label" for="gstin">GSTIN <span class="text-[#9CA3AF] font-normal">(Optional)</span></label>
<p class="text-[12px] text-[#9CA3AF] mb-2 -mt-1">Provide for GST invoices</p>
<input class="input-field uppercase" id="gstin" placeholder="22AAAAA0000A1Z5" type="text"/>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full max-w-[390px] p-4 bg-surface-container-lowest border-t border-outline-variant shadow-[0_-4px_12px_rgba(0,0,0,0.05)] z-40 transform translate-y-full transition-transform duration-500 ease-out" id="bottomNav">
<button class="w-full h-[52px] bg-primary-container text-white rounded-xl font-label-lg text-label-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-sm">
            Next: Upload Documents
            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
<script>
        // Trigger animations after a slight delay to ensure DOM is ready
        setTimeout(() => {
            // Animate progress bar to 66% (step 2 of 3)
            document.getElementById('progressBar').style.width = '50%';
            
            // Slide up bottom nav
            document.getElementById('bottomNav').classList.remove('translate-y-full');
            document.getElementById('bottomNav').classList.add('translate-y-0');
        }, 100);
    </script>
</body></html>
