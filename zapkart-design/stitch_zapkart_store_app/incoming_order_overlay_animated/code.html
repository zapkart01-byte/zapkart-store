<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
        
        /* New Animations */
        @keyframes springUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        .animate-spring-up {
            animation: springUp 400ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scaleBounce {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-scale-bounce {
            animation: scaleBounce 400ms cubic-bezier(0.34, 1.56, 0.64, 1) 200ms forwards;
            opacity: 0;
        }

        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-stagger-item-1 { animation: fadeSlideUp 300ms ease-out 50ms forwards; opacity: 0; }
        .animate-stagger-item-2 { animation: fadeSlideUp 300ms ease-out 100ms forwards; opacity: 0; }
        .animate-stagger-item-3 { animation: fadeSlideUp 300ms ease-out 150ms forwards; opacity: 0; }

        @keyframes pulseTimerRed {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .animate-pulse-red { animation: pulseTimerRed 1s infinite; }
        
        @keyframes shimmerSweep {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .shimmer-green {
            background: linear-gradient(90deg, #16A34A 0%, #4ADE80 50%, #16A34A 100%);
            background-size: 200% auto;
            animation: shimmerSweep 2.5s infinite linear;

        .sheet-radius { border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; }

<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Timer Logic
            let timeLeft = 28;
            const container = document.getElementById('countdown-container');
            const icon = document.getElementById('countdown-icon');
            const text = document.getElementById('countdown-text');

            function updateTimerDisplay() {
                text.textContent = `${timeLeft}s to confirm`;
                
                // Remove existing classes
                container.className = 'px-3 py-1 rounded-full flex items-center gap-1 border';
                icon.className = 'material-symbols-outlined text-[16px]';
                text.className = 'font-label-md text-label-md';

                if (timeLeft > 30) {
                    container.classList.add('bg-[#DCFCE7]', 'border-[#bbf7d0]');
                    icon.classList.add('text-[#16A34A]');
                    text.classList.add('text-[#16A34A]');
                } else if (timeLeft >= 10 && timeLeft <= 30) {
                    container.classList.add('bg-[#FEF3C7]', 'border-[#FDE68A]');
                    icon.classList.add('text-[#D97706]');
                    text.classList.add('text-[#D97706]');
                } else if (timeLeft < 10) {
                    container.classList.add('bg-[#FEE2E2]', 'border-[#fecaca]', 'animate-pulse-red');
                    icon.classList.add('text-[#EF4444]');
                    text.classList.add('text-[#EF4444]');
                }
            }

            const timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);

            // Initialize display
            updateTimerDisplay();

            // Toggle Checkboxes Logic
            const toggleBtn = document.getElementById('toggle-unavailable-btn');
            const checkboxes = document.querySelectorAll('.checkbox-container');
            let isSelecting = false;

            toggleBtn.addEventListener('click', () => {
                isSelecting = !isSelecting;
                checkboxes.forEach(container => {
                    if (isSelecting) {
                        container.classList.remove('hidden');
                        container.classList.add('block');
                    } else {
                        container.classList.add('hidden');
                        container.classList.remove('block');
                    }
                });
                
                if (isSelecting) {
                    toggleBtn.innerHTML = `<span class="material-symbols-outlined text-[16px]">close</span> Cancel Selection`;
                } else {
                    toggleBtn.innerHTML = `<span class="material-symbols-outlined text-[16px]">report</span> Mark item as unavailable`;
                    // Reset checkboxes
                    document.querySelectorAll('.checkbox-container input').forEach(input => input.checked = false);
                }
            });
        });
    </script>
