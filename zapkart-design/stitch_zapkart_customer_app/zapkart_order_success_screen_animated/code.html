<style>
        body { font-family: 'Inter', sans-serif; min-height: max(884px, 100dvh); }
        
        /* Animations */
        @keyframes strokeAnimation {
            0% { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); opacity: 0; }
            50% { opacity: 1; }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .animate-check {
            animation: strokeAnimation 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
            opacity: 0; /* Start hidden */
        }
        
        .fade-in-element {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        .slide-up-element {
            opacity: 0;
            animation: slideUp 0.5s ease-out forwards;
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            animation: fall 1.5s linear forwards;
        }

        @media (prefers-reduced-motion: reduce) {
            .animate-check, .fade-in-element, .slide-up-element, .confetti {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
                clip-path: none !important;
            }
            .typewriter-cursor {
                display: none !important;
            }
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: currentColor;
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="bg-surface-container-high flex justify-center items-center min-h-screen antialiased relative">
<!-- Confetti Container -->
<div class="absolute inset-0 overflow-hidden pointer-events-none z-50" id="confetti-container"></div>
<!-- Mobile Device Container -->
<div class="w-full max-w-[390px] h-[844px] bg-white relative flex flex-col overflow-hidden shadow-2xl z-0">
<!-- TopAppBar -->
<header class="bg-surface text-primary font-headline-sm text-headline-sm docked full-width top-0 bg-surface flat no shadows flex items-center justify-between px-margin-mobile w-full h-16 shrink-0 z-10 transition-colors duration-200">
<button class="flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors duration-200 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-on-surface">Order Success</h1>
<div class="w-10"></div> <!-- Spacer for absolute centering -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile mt-[-40px]">
<!-- Success Circle -->
<div class="w-[80px] h-[80px] rounded-full bg-primary-container text-white flex items-center justify-center shadow-[0_0_24px_rgba(255,107,0,0.25)] relative z-10">
<span class="material-symbols-outlined animate-check" data-icon="check" style="font-size: 40px; font-variation-settings: 'wght' 600;">check</span>
</div>
<!-- Headings -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mt-[20px] min-h-[36px]" id="typewriter-text">
<span id="typed-content"></span><span class="typewriter-cursor" id="cursor"></span>
</h2>
<div class="flex flex-col items-center w-full fade-in-element" id="details-container" style="animation-delay: 1s;">
<p class="font-body-sm text-body-sm text-outline mt-[6px]">#ZK-48291</p>
<!-- Divider -->
<div class="w-full max-w-[280px] h-px bg-surface-variant my-[32px]"></div>
<!-- Delivery Info -->
<p class="font-body-sm text-body-sm text-outline">Estimated Delivery</p>
<p class="font-headline-md text-headline-md text-primary-container mt-[4px]">28 minutes</p>
<!-- Summary Text -->
<p class="font-body-sm text-body-sm text-outline mt-[24px]">3 items · ₹237 · Cash on Delivery</p>
</div>
</main>
<!-- Bottom Actions Area -->
<div class="w-full px-margin-mobile pb-[12px] pt-4 bg-white shrink-0 flex flex-col items-center slide-up-element" style="animation-delay: 1.1s;">
<button class="w-full h-[52px] bg-primary-container text-white rounded-[14px] font-label-lg text-label-lg flex items-center justify-center shadow-[0_4px_14px_rgba(255,107,0,0.2)] hover:bg-[#e66000] transition-colors active:scale-[0.98]">
                Track My Order →
            </button>
<button class="w-full h-[52px] bg-white border border-outline-variant text-on-surface rounded-xl font-label-lg text-label-lg flex items-center justify-center mt-[8px] mb-[12px] hover:bg-surface-container-low transition-colors active:scale-[0.98]">
                Continue Shopping
            </button>
<p class="font-label-md text-label-md text-outline text-center mb-[12px]">SMS confirmation sent to +91 98765 XXXXX</p>
<!-- Home Indicator placeholder -->
<div class="w-[134px] h-[5px] bg-surface-variant rounded-full mt-1"></div>
</div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (prefersReducedMotion) {
            document.getElementById('typed-content').textContent = "Order Placed! 🎉";
            document.getElementById('cursor').style.display = 'none';
            return;
        }

        // Typewriter Effect
        const textToType = "Order Placed! 🎉";
        const typedContent = document.getElementById('typed-content');
        const cursor = document.getElementById('cursor');
        let i = 0;
        
        // Start typing after check animation (600ms)
        setTimeout(() => {
            const typeInterval = setInterval(() => {
                if (i < textToType.length) {
                    typedContent.textContent += textToType.charAt(i);
                    i++;
                } else {
                    clearInterval(typeInterval);
                    cursor.style.display = 'none';
                }
            }, 30); // ~400ms total for typing
        }, 600);

        // Confetti Effect
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#ff6b00', '#ffffff']; // Orange and white
            
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Random properties
                const left = Math.random() * 100; // 0 to 100vw
                const color = colors[Math.floor(Math.random() * colors.length)];
                const delay = Math.random() * 0.5; // slight stagger
                
                confetti.style.left = `${left}vw`;
                confetti.style.backgroundColor = color;
                confetti.style.animationDelay = `${delay}s`;
                
                // Slightly vary size
                const size = 4 + Math.random() * 6;
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;

                container.appendChild(confetti);
                
                // Cleanup
                setTimeout(() => {
                    confetti.remove();
                }, (1.5 + delay) * 1000);
            }
        }
        
        // Start confetti at the end of the sequence (~1.2s)
        setTimeout(createConfetti, 1200);
    });
</script>
</body></html>
