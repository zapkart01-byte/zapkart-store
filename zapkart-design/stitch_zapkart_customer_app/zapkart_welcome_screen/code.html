<style>
        /* Custom Animations based on requirements */
        @keyframes slideUpIllustration {
            0% { transform: translateY(60px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes fadeInStaggered {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpButton {
            0% { transform: translateY(40px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .anim-illustration {
            animation: slideUpIllustration 500ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .anim-heading {
            opacity: 0;
            animation: fadeInStaggered 600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms forwards;
        }

        .anim-subtitle {
            opacity: 0;
            animation: fadeInStaggered 600ms cubic-bezier(0.16, 1, 0.3, 1) 400ms forwards;
        }

        .anim-button-area {
            opacity: 0;
            animation: slideUpButton 600ms cubic-bezier(0.16, 1, 0.3, 1) 300ms forwards;
        }
    </style>
</head>
<body class="bg-surface-container-lowest h-[100dvh] w-full flex flex-col font-sans overflow-hidden antialiased max-w-[390px] mx-auto relative shadow-2xl">
<!-- Top 45% Area: Illustration -->
<div class="h-[45%] w-full flex items-end justify-center pb-xl relative">
<div class="anim-illustration relative z-10 w-full max-w-[280px]">
<img alt="ZapKart Delivery Rider" class="w-full h-auto drop-shadow-[0_10px_20px_rgba(255,107,0,0.15)] object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZIF-lfpbMX1mJua9KeQbbkhnWQgDZUfdqD3_YHyPgBSQcEQGtHDVKEuqg2F3e6gyOZo8JLoVkGqNSP8s0fFIK2ZLbFOA97LArfb5T1C6LY3oVtSdOXX5Kg2u9QBU6Yj9wHUcUfOBGWHc2yGS6vP_HyOFbuJ63r0jKIPzbIqQD759Fz6UnUBhUXqRD_I-4W6Yg_FFgAwqOK9tKmAt1ZoI2d5RBfHzqp3UVLaLELySDjPRl7aK4uRAPT6WWW9XFA1YlVM9toErBoQ"/>
</div>
</div>
<!-- Bottom 55% Area: Content -->
<div class="h-[55%] w-full flex flex-col items-center justify-start px-margin-mobile pt-lg pb-margin-mobile text-center relative z-20">
<!-- Heading -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface max-w-[320px] mx-auto anim-heading">
            Your neighbourhood, delivered ⚡
        </h1>
<!-- Subtitle -->
<p class="font-body-md text-body-md text-on-surface-variant mt-lg max-w-[300px] mx-auto anim-subtitle">
            Order groceries from local stores and get them in 30 minutes or less.
        </p>
<!-- Bottom Action Area -->
<div class="w-full mt-auto anim-button-area flex flex-col items-center pb-xl">
<!-- Get Started Button -->
<button class="w-full bg-primary-container text-white font-headline-sm text-body-md h-[52px] rounded-[14px] shadow-[0_4px_14px_rgba(255,107,0,0.25)] active:scale-[0.98] active:shadow-md transition-all duration-200 flex items-center justify-center">
                Get Started
            </button>
<!-- Footer Text -->
<p class="mt-md font-body-sm text-body-sm text-on-surface-variant tracking-wide">
                Already have an account? 
                <a class="text-primary-container font-semibold hover:opacity-80 transition-opacity ml-xs" href="#">Sign In</a>
</p>
</div>
</div>
