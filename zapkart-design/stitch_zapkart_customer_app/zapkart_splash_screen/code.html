<style>
    body {
      background-color: #FFFFFF;
      height: 100vh;
      width: 100vw;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    .splash-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 390px;
      max-height: 844px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #logo {
      opacity: 0;
      transform: scale(0.8);
      transition: transform 600ms cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 600ms ease-out;
    }
    
    #logo.animate {
      opacity: 1;
      transform: scale(1);
    }

    #tagline {
      color: #6B7280;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 400ms ease-in-out;
    }
    
    #tagline.animate {
      opacity: 1;
    }

    .progress-container {
      position: absolute;
      bottom: 60px;
      width: 120px;
      height: 4px;
      background-color: #f3f0ef; /* inverse-on-surface */
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background-color: #FF6B00; /* primary-container */
      border-radius: 10px;
      transition: width 2000ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .progress-bar.animate {
      width: 100%;
    }
  </style>
</head>

<script>
    document.addEventListener("DOMContentLoaded", () => {
      const logo = document.getElementById('logo');
      const tagline = document.getElementById('tagline');
      const progress = document.getElementById('progress');

      // 1. Logo scales gently from 80% to 100% over 600ms on load.
      setTimeout(() => {
        logo.classList.add('animate');
      }, 50);

      // 2. Tagline fades in 400ms after logo.
      setTimeout(() => {
        tagline.classList.add('animate');
      }, 450); // 50ms + 400ms

      // 3. Progress bar animates left to right.
      setTimeout(() => {
        progress.classList.add('animate');
      }, 200);
      
      // Simulate navigation after loading completes
      setTimeout(() => {
         console.log("Navigation to Home triggered");
      }, 2500);
    });
  </script>
