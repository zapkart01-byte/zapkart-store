                            "0%, 100%": { color: "#EF4444", opacity: "1", transform: "scale(1)" },
                            "50%": { color: "#991B1B", opacity: "0.7", transform: "scale(1.05)" }
                        },
                        "shimmer": {
                            "0%": { transform: "translateX(-100%)" },
                            "100%": { transform: "translateX(100%)" }
                        },
                        "bounce-in": {
                            "0%": { transform: "scale(0.8)", opacity: "0" },
                            "60%": { transform: "scale(1.1)", opacity: "1" },
                            "100%": { transform: "scale(1)" }
                        }
                    },
                    "animation": {
                        "slide-up": "slide-up 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards",
                        "pulse-red": "pulse-red 1.5s ease-in-out infinite",
                        "shimmer": "shimmer 2s infinite",
                        "bounce-in": "bounce-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards"

<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .bg-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }
        .shimmer-effect {
            position: relative;
            overflow: hidden;
        }
        .shimmer-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: translateX(-100%);
            animation: shimmer 2s infinite;
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            .shimmer-effect::after {
                display: none !important;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface h-screen w-screen relative">

</div>
<!-- Dimming Overlay -->
<div class="absolute inset-0 bg-overlay z-10 flex flex-col justify-end">
<!-- Bottom Sheet -->
<div class="bg-surface w-full h-[72%] rounded-t-[20px] shadow-lg flex flex-col animate-slide-up z-20 overflow-hidden relative border-t border-outline-variant">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-4 pb-2">
<div class="w-10 h-1 bg-[#FF6B00] rounded-full"></div>
</div>
<!-- Content Area -->
<div class="flex-1 px-container-margin flex flex-col items-center pt-4 pb-6 overflow-y-auto">
<!-- Badge -->
<div class="bg-[#FFF0E6] text-[#FF6B00] font-bold text-[11px] uppercase tracking-wider px-3 py-1 rounded-full mb-4">
                    NEW ORDER
                </div>
<!-- Order Value -->
<div class="text-center mb-6">
<h1 class="text-[48px] font-bold text-[#0D0D0D] leading-none mb-1 animate-bounce-in">₹280</h1>
<p class="text-[14px] text-[#FF6B00]">Earn ₹55 for this delivery</p>
</div>
<!-- Info Grid -->
<div class="grid grid-cols-2 gap-4 w-full max-w-md mb-8">
<!-- Store -->
<div class="bg-[#F8F9FA] rounded-xl p-4 border border-outline-variant">
<div class="flex items-center mb-1">
<span class="material-symbols-outlined text-secondary mr-2" style="font-size: 18px;">storefront</span>
<span class="font-label-sm text-label-sm text-secondary">Pickup</span>
</div>
<p class="font-label-md text-label-md text-on-surface truncate">Quick Mart, MG Road</p>
<p class="font-body-sm text-body-sm text-secondary">0.8 km away</p>
</div>
<!-- Delivery -->
<div class="bg-[#F8F9FA] rounded-xl p-4 border border-outline-variant">
<div class="flex items-center mb-1">
<span class="material-symbols-outlined text-secondary mr-2" style="font-size: 18px;">location_on</span>
<span class="font-label-sm text-label-sm text-secondary">Drop</span>
</div>
<p class="font-label-md text-label-md text-on-surface truncate">Koramangala 5th Block</p>
<p class="font-body-sm text-body-sm text-secondary">2.3 km</p>
</div>
<!-- Items -->
<div class="bg-[#F8F9FA] rounded-xl p-4 border border-outline-variant">
<div class="flex items-center mb-1">
<span class="material-symbols-outlined text-secondary mr-2" style="font-size: 18px;">shopping_bag</span>

<p class="font-label-md text-label-md text-on-surface">5 items</p>
</div>
<!-- Timer -->
<div class="bg-[#F8F9FA] rounded-xl p-4 border border-outline-variant flex flex-col justify-center items-center">
<span class="material-symbols-outlined text-[#EF4444] mb-1 animate-pulse-red" style="font-size: 24px;">timer</span>
<p class="font-label-md text-label-md text-[#EF4444] animate-pulse-red" id="timer-text">28s remaining</p>
</div>
</div>
<!-- Spacer -->
<div class="flex-1"></div>
<!-- Actions -->
<div class="w-full max-w-md mt-auto">
<button class="w-full h-[56px] bg-[#16A34A] text-white rounded-full font-label-md text-label-md flex items-center justify-center shimmer-effect hover:opacity-90 transition-opacity mb-4">
<span class="material-symbols-outlined mr-2" style="font-weight: 700;">check</span>
                        Accept Order
                    </button>
<button class="w-full text-center font-body-sm text-body-sm text-secondary hover:text-on-surface transition-colors">
                        Decline
                    </button>
</div>
</div>
</div>
</div>
<script>
        // Simple timer logic for demonstration
        let timeLeft = 28;
        const timerElement = document.getElementById('timer-text');
        
        const interval = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) {
                timerElement.innerText = `${timeLeft}s remaining`;
            } else {
                clearInterval(interval);
                timerElement.innerText = `0s remaining`;
            }
        }, 1000);
    </script>
