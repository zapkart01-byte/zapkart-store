<style>
        body { background-color: #ffffff; /* Pure white background */ }
        
        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(255, 107, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 0, 0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-phase-in { animation: slideDown 0.4s ease-out forwards; }
        .animate-pulse-btn { animation: pulseBorder 2s infinite; }
        .animate-bottom-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .shadow-soft { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="w-[390px] h-[844px] mx-auto relative overflow-hidden font-body-sm text-on-surface">
<!-- TOP NAVIGATION -->
<header class="w-full top-0 sticky bg-surface border-b border-surface-variant flex items-center justify-between px-gutter h-14 z-50">
<div class="w-8">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer" data-icon="menu">menu</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary font-bold text-[17px]">Order #7284</h1>
<div class="w-8 flex justify-end">
<span class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high transition-colors cursor-pointer rounded-full p-1" data-icon="support_agent">support_agent</span>
</div>
</header>
<main class="px-container-margin pt-4 pb-[100px] h-full overflow-y-auto hide-scrollbar">
<!-- PHASE INDICATOR -->
<div class="flex gap-2 mb-6 animate-phase-in opacity-0">
<div class="flex-1 flex items-center justify-center gap-1 bg-[#DCFCE7] text-[#16A34A] py-2 rounded-[10px] font-label-md">
<span class="material-symbols-outlined text-[16px] font-bold" data-weight="fill">check</span>
                Pick Up
            </div>
<div class="flex-1 flex items-center justify-center gap-1 bg-[#F8F9FA] text-[#9CA3AF] py-2 rounded-[10px] border border-dashed border-[#E9ECEF] font-label-md">
<span class="material-symbols-outlined text-[16px]">radio_button_unchecked</span>
                Deliver
            </div>
</div>
<!-- STORE SECTION -->
<section class="mb-6">
<div class="text-[#FF6B00] font-bold text-[11px] tracking-wider uppercase mb-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">location_on</span>
                Go to Store
            </div>
<h2 class="font-display-lg-mobile text-display-lg-mobile text-[22px] mb-1">Quick Mart</h2>
<p class="text-[#6B7280] font-body-sm mb-4">14, MG Road, Near Metro Station</p>
<button class="w-full bg-white border-2 border-[#FF6B00] text-[#FF6B00] h-[48px] rounded-[12px] flex items-center justify-center gap-2 font-label-md animate-pulse-btn hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[20px]">near_me</span>
                Navigate to Store
            </button>
</section>
<!-- ITEMS CARD -->
<section class="bg-[#F8F9FA] rounded-[12px] border border-[#E9ECEF] shadow-soft p-4">
<h3 class="font-label-md text-label-md mb-3 text-on-surface">Items to collect (5)</h3>
<div class="flex flex-col">
<div class="flex justify-between items-center py-3 border-b border-[#E9ECEF] last:border-0">
<div class="flex items-center gap-3">
<span class="text-2xl">🍎</span>
<span class="font-body-lg text-body-lg text-on-surface">Apple</span>
</div>
<span class="font-label-md text-label-md text-secondary">× 4</span>
</div>
<div class="flex justify-between items-center py-3 border-b border-[#E9ECEF] last:border-0">
<div class="flex items-center gap-3">
<span class="text-2xl">🥛</span>
<span class="font-body-lg text-body-lg text-on-surface">Milk 1L</span>
</div>
<span class="font-label-md text-label-md text-secondary">× 1</span>
</div>
<div class="flex justify-between items-center py-3 border-b border-[#E9ECEF] last:border-0">
<div class="flex items-center gap-3">
<span class="text-2xl">🍞</span>
<span class="font-body-lg text-body-lg text-on-surface">Whole Wheat Bread</span>
</div>
<span class="font-label-md text-label-md text-secondary">× 1</span>
</div>
</div>
</section>
</main>
<!-- FIXED BOTTOM ACTION -->
<div class="fixed bottom-0 left-0 w-[390px] p-4 bg-white border-t border-surface-variant z-50 animate-bottom-up opacity-0">
<button class="w-full bg-primary-container text-white h-[52px] rounded-[14px] flex items-center justify-center gap-2 font-label-md hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-[20px]">shopping_bag</span>
            Items Collected — Mark Picked Up
        </button>
</div>
</body></html>
