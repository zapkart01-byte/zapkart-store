                      "surface-container-high": "#ebe7e7",

                      "inverse-surface": "#313030",

              },
              animation: {
                'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'bob': 'bob 2s ease-in-out infinite',
                'slide-up': 'slideUp 0.5s ease-out forwards',
              },
              keyframes: {
                pulseGlow: {
                  '0%, 100%': { boxShadow: '0 0 0 0 rgba(22, 163, 74, 0.4)' },
                  '50%': { boxShadow: '0 0 0 8px rgba(22, 163, 74, 0)' },
                },
                bob: {
                  '0%, 100%': { transform: 'translateY(-4px)' },
                  '50%': { transform: 'translateY(4px)' },
                },
                slideUp: {
                  '0%': { transform: 'translateY(100%)', opacity: '0' },

            },

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #1c1b1b;
            -webkit-font-smoothing: antialiased;
            max-width: 480px; /* Restrict to mobile width for preview */
            margin: 0 auto;
            position: relative;
            height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Stats counter animation handled by JS */
        
        .tip-card {
            opacity: 0;
        }

        @media (prefers-reduced-motion: no-preference) {
            .tip-card {
                animation: slide-up 0.5s ease-out 0.6s forwards;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .tip-card {
                opacity: 1;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface">
<!-- Top Bar Area (Custom, not standard TopAppBar as per prompt layout) -->
<header class="px-container-margin pt-6 pb-4 flex justify-between items-center bg-surface sticky top-0 z-40">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-on-primary font-bold text-lg shadow-sm">
                RK
            </div>
<div class="flex flex-col">
<span class="text-[17px] font-bold text-[#0D0D0D] leading-tight">Good morning, Rahul</span>
<span class="text-[12px] text-[#9CA3AF] leading-tight mt-0.5">Tap to go offline</span>
</div>
</div>
<div class="bg-[#DCFCE7] text-[#16A34A] px-3 py-1.5 rounded-full flex items-center gap-2 border border-[#bbf7d0] cursor-pointer motion-safe:animate-pulse-glow">
<div class="w-2 h-2 rounded-full bg-[#16A34A]"></div>
<span class="text-[13px] font-bold">Online</span>
</div>
</header>
<main class="flex-1 flex flex-col px-container-margin pb-24 overflow-y-auto">
<!-- Stats Row -->
<div class="grid grid-cols-3 gap-3 mt-4">
<!-- Card 1 -->
<div class="bg-surface-container-low rounded-[10px] p-3 border border-surface-variant shadow-[0_2px_8px_rgba(0,0,0,0.04)] flex flex-col items-center justify-center">
<div class="text-[20px] font-bold text-primary-container leading-none mb-1 stat-number" data-prefix="₹" data-target="420">₹0</div>
<div class="text-[12px] font-medium text-secondary">Today</div>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-low rounded-[10px] p-3 border border-surface-variant shadow-[0_2px_8px_rgba(0,0,0,0.04)] flex flex-col items-center justify-center">
<div class="text-[20px] font-bold text-on-surface leading-none mb-1 stat-number" data-target="7">0</div>
<div class="text-[12px] font-medium text-secondary">Deliveries</div>
</div>
<!-- Card 3 -->
<div class="bg-surface-container-low rounded-[10px] p-3 border border-surface-variant shadow-[0_2px_8px_rgba(0,0,0,0.04)] flex flex-col items-center justify-center">
<div class="text-[20px] font-bold text-on-surface leading-none mb-1 flex items-center gap-1">
<span class="stat-number-float" data-target="4.9">0.0</span> <span class="text-[14px]">⭐</span>
</div>
<div class="text-[12px] font-medium text-secondary">Rating</div>
</div>
</div>
<!-- Waiting State -->
<div class="flex-1 flex flex-col items-center justify-center mt-12 mb-8">
<div class="w-[80px] h-[80px] rounded-full bg-surface-container-high flex items-center justify-center mb-6 shadow-inner relative">
<!-- Inner pulsing ring -->
<div class="absolute inset-0 rounded-full border-2 border-surface-variant animate-ping opacity-20"></div>
<span class="material-symbols-outlined text-[36px] text-secondary motion-safe:animate-bob" style="font-variation-settings: 'FILL' 1;">moped</span>
</div>
<h2 class="text-[16px] font-semibold text-[#9CA3AF] mb-1">Waiting for orders...</h2>
<p class="text-[13px] text-[#C4C4C4]">Stay online to receive orders</p>
</div>
<!-- Tip Card -->
<div class="bg-[#FFF0E6] rounded-[12px] p-4 mt-auto mb-4 border border-[#FFE4D6] flex items-center gap-2 tip-card shadow-sm">
<span class="text-[16px]">💡</span>
<span class="text-[13px] text-primary-container font-semibold">Complete 5 more for ₹150 bonus</span>
</div>
</main>
<!-- BottomNavBar JSON injection -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface dark:bg-surface border-t border-outline-variant dark:border-outline-variant shadow-lg rounded-t-xl md:hidden max-w-[480px] mx-auto right-0">
<!-- Dashboard (Active logic applied) -->
<button aria-label="Dashboard" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1.5 transition-transform scale-95">
<span class="material-symbols-outlined mb-1 text-[24px]" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-label-sm text-label-sm">Dashboard</span>
</button>
<!-- Deliveries -->
<button aria-label="Deliveries" class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed hover:text-primary transition-colors">
<span class="material-symbols-outlined mb-1 text-[24px]">local_shipping</span>
<span class="font-label-sm text-label-sm">Deliveries</span>
</button>
<!-- Earnings -->
<button aria-label="Earnings" class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed hover:text-primary transition-colors">
<span class="material-symbols-outlined mb-1 text-[24px]">payments</span>
<span class="font-label-sm text-label-sm">Earnings</span>
</button>
<!-- Profile -->
<button aria-label="Profile" class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed hover:text-primary transition-colors">
<span class="material-symbols-outlined mb-1 text-[24px]">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</button>
</nav>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            // Integer Stats Counter Animation
            const intStats = document.querySelectorAll('.stat-number');
            intStats.forEach(stat => {
                const target = parseInt(stat.getAttribute('data-target'));
                const prefix = stat.getAttribute('data-prefix') || '';
                
                if (prefersReducedMotion) {
                    stat.innerText = prefix + target;
                } else {
                    const duration = 1500; // ms
                    const steps = 60;
                    const stepTime = Math.abs(Math.floor(duration / steps));
                    let current = 0;
                    
                    const timer = setInterval(() => {
                        current += target / steps;
                        if (current >= target) {
                            stat.innerText = prefix + target;
                            clearInterval(timer);
                        } else {
                            stat.innerText = prefix + Math.floor(current);
                        }
                    }, stepTime);
                }
            });

            // Float Stats Counter Animation (for rating)
            const floatStats = document.querySelectorAll('.stat-number-float');
            floatStats.forEach(stat => {
                const target = parseFloat(stat.getAttribute('data-target'));
                
                if (prefersReducedMotion) {
                    stat.innerText = target.toFixed(1);
                } else {
                    const duration = 1500;
                    const steps = 60;
                    const stepTime = Math.abs(Math.floor(duration / steps));
                    let current = 0;
                    
                    const timer = setInterval(() => {
                        current += target / steps;
                        if (current >= target) {
                            stat.innerText = target.toFixed(1);
                            clearInterval(timer);
                        } else {
                            stat.innerText = current.toFixed(1);
                        }
                    }, stepTime);
                }
            });
        });
    </script>
</body></html>
